name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      backend_image_ref: ${{ steps.meta.outputs.backend_image_ref }}
      frontend_image_ref: ${{ steps.meta.outputs.frontend_image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          BACKEND_REPO=$(echo "${{ env.BACKEND_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          FRONTEND_REPO=$(echo "${{ env.FRONTEND_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image_ref=${BACKEND_REPO}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_ref=${FRONTEND_REPO}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image_ref }}:latest
            ${{ steps.meta.outputs.backend_image_ref }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.backend_image_ref }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.backend_image_ref }}:buildcache,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.REACT_APP_API_BASE_URL || '' }}
          tags: |
            ${{ steps.meta.outputs.frontend_image_ref }}:latest
            ${{ steps.meta.outputs.frontend_image_ref }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.frontend_image_ref }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.frontend_image_ref }}:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy server files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,deploy.sh"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Run deploy script over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,IMAGE_TAG
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x deploy.sh
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            export BACKEND_IMAGE="${{ needs.build-and-push.outputs.backend_image_ref }}"
            export FRONTEND_IMAGE="${{ needs.build-and-push.outputs.frontend_image_ref }}"
            ./deploy.sh
